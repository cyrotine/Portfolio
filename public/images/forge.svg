<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <!-- Background -->
  <rect width="600" height="360" fill="#0d0b10"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="1" fill="#2a2535" opacity="0.6"/>
  </pattern>
  <rect width="600" height="360" fill="url(#dots)"/>

  <!-- Radial glow at center -->
  <radialGradient id="glow" cx="50%" cy="50%" r="45%">
    <stop offset="0%" stop-color="#c2a4ff" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#c2a4ff" stop-opacity="0"/>
  </radialGradient>
  <rect width="600" height="360" fill="url(#glow)"/>

  <!-- Pipeline flow path (S-shape: top row L->R, bottom row R->L) -->
  <g stroke="#c2a4ff" stroke-opacity="0.3" stroke-width="1.5" stroke-dasharray="5,5" fill="none">
    <line x1="118" y1="120" x2="222" y2="120"/>
    <line x1="278" y1="120" x2="382" y2="120"/>
    <line x1="438" y1="120" x2="510" y2="120"/>
    <!-- wrap down to bottom row -->
    <path d="M510,120 q40,0 40,40 q0,40 -40,40"/>
    <line x1="510" y1="240" x2="438" y2="240"/>
    <line x1="382" y1="240" x2="278" y2="240"/>
    <line x1="222" y1="240" x2="118" y2="240"/>
  </g>

  <!-- Auto-repair loop arc (PR Generator back into pipeline) -->
  <path d="M90,222 q-50,-42 0,-84" fill="none" stroke="#c2a4ff" stroke-opacity="0.4" stroke-width="1.5"/>
  <polygon points="90,138 84,148 96,148" fill="#c2a4ff" fill-opacity="0.5"/>
  <text x="34" y="184" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9" font-family="sans-serif">3x repair</text>

  <!-- TOP ROW stages -->
  <!-- 1. Issue Analyzer -->
  <circle cx="90" cy="120" r="28" fill="#160f20" stroke="#c2a4ff" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="90" y="127" text-anchor="middle" fill="#c2a4ff" font-size="20" font-family="sans-serif">⌕</text>
  <text x="90" y="80" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10" font-family="sans-serif">Analyzer</text>

  <!-- 2. Planner -->
  <circle cx="250" cy="120" r="28" fill="#160f20" stroke="#c2a4ff" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="250" y="127" text-anchor="middle" fill="#c2a4ff" font-size="18" font-family="sans-serif">▤</text>
  <text x="250" y="80" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10" font-family="sans-serif">Planner</text>

  <!-- 3. Developer -->
  <circle cx="410" cy="120" r="28" fill="#160f20" stroke="#c2a4ff" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="410" y="127" text-anchor="middle" fill="#c2a4ff" font-size="18" font-family="sans-serif">&lt;/&gt;</text>
  <text x="410" y="80" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10" font-family="sans-serif">Developer</text>

  <!-- BOTTOM ROW stages -->
  <!-- 4. QA -->
  <circle cx="410" cy="240" r="28" fill="#160f20" stroke="#c2a4ff" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="410" y="247" text-anchor="middle" fill="#c2a4ff" font-size="18" font-family="sans-serif">✓</text>
  <text x="410" y="288" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10" font-family="sans-serif">QA</text>

  <!-- 5. Reviewer -->
  <circle cx="250" cy="240" r="28" fill="#160f20" stroke="#c2a4ff" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="250" y="247" text-anchor="middle" fill="#c2a4ff" font-size="18" font-family="sans-serif">⚖</text>
  <text x="250" y="288" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10" font-family="sans-serif">Reviewer</text>

  <!-- 6. PR Generator -->
  <circle cx="90" cy="240" r="28" fill="#1e1430" stroke="#c2a4ff" stroke-width="2"/>
  <text x="90" y="247" text-anchor="middle" fill="#c2a4ff" font-size="18" font-family="sans-serif">⑂</text>
  <text x="90" y="288" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10" font-family="sans-serif">PR Gen</text>

  <!-- Title tag -->
  <text x="300" y="332" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="11" font-family="sans-serif" letter-spacing="2">ISSUE → MERGE-READY PR</text>
</svg>
