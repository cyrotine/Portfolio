<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <!-- Background -->
  <rect width="600" height="360" fill="#0d0b10"/>

  <!-- Subtle dot grid -->
  <pattern id="ddots" x="0" y="0" width="25" height="25" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.8" fill="#2a2535" opacity="0.5"/>
  </pattern>
  <rect width="600" height="360" fill="url(#ddots)"/>

  <!-- Radial glow -->
  <radialGradient id="ddGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#c2a4ff" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#c2a4ff" stop-opacity="0"/>
  </radialGradient>
  <rect width="600" height="360" fill="url(#ddGlow)"/>

  <!-- ── Bar chart (left panel) ── -->
  <text x="72" y="58" fill="rgba(255,255,255,0.4)" font-size="10" font-family="sans-serif">Biomarker Distribution</text>

  <!-- Chart axes -->
  <line x1="55" y1="62" x2="55" y2="245" stroke="#2e2a38" stroke-width="1"/>
  <line x1="55" y1="245" x2="250" y2="245" stroke="#2e2a38" stroke-width="1"/>

  <!-- Bars -->
  <rect x="68" y="130" width="22" height="115" rx="3" fill="#c2a4ff" opacity="0.7"/>
  <rect x="98" y="158" width="22" height="87" rx="3" fill="#c2a4ff" opacity="0.55"/>
  <rect x="128" y="105" width="22" height="140" rx="3" fill="#c2a4ff" opacity="0.7"/>
  <rect x="158" y="175" width="22" height="70" rx="3" fill="#c2a4ff" opacity="0.45"/>
  <rect x="188" y="88" width="22" height="157" rx="3" fill="#c2a4ff" opacity="0.8"/>
  <rect x="218" y="148" width="22" height="97" rx="3" fill="#c2a4ff" opacity="0.55"/>

  <!-- Bar labels -->
  <text x="79" y="258" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="9" font-family="sans-serif">CRP</text>
  <text x="109" y="258" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="9" font-family="sans-serif">Hgb</text>
  <text x="139" y="258" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="9" font-family="sans-serif">WBC</text>
  <text x="169" y="258" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="9" font-family="sans-serif">PLT</text>
  <text x="199" y="258" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="9" font-family="sans-serif">Fe</text>
  <text x="229" y="258" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="9" font-family="sans-serif">ESR</text>

  <!-- ── Line chart (top right) ── -->
  <text x="290" y="58" fill="rgba(255,255,255,0.4)" font-size="10" font-family="sans-serif">Pattern Analysis</text>

  <line x1="275" y1="62" x2="275" y2="180" stroke="#2e2a38" stroke-width="1"/>
  <line x1="275" y1="180" x2="570" y2="180" stroke="#2e2a38" stroke-width="1"/>

  <!-- Line chart path -->
  <polyline
    points="285,155 320,130 355,142 390,105 425,118 460,88 495,102 530,78 560,90"
    fill="none"
    stroke="#c2a4ff"
    stroke-width="2"
    stroke-opacity="0.8"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Area fill under line -->
  <polygon
    points="285,155 320,130 355,142 390,105 425,118 460,88 495,102 530,78 560,90 560,180 285,180"
    fill="#c2a4ff"
    fill-opacity="0.05"/>

  <!-- Data points on line -->
  <g fill="#c2a4ff">
    <circle cx="285" cy="155" r="3"/>
    <circle cx="320" cy="130" r="3"/>
    <circle cx="355" cy="142" r="3"/>
    <circle cx="390" cy="105" r="3"/>
    <circle cx="425" cy="118" r="3"/>
    <circle cx="460" cy="88" r="3"/>
    <circle cx="495" cy="102" r="3"/>
    <circle cx="530" cy="78" r="3"/>
    <circle cx="560" cy="90" r="3"/>
  </g>

  <!-- ── Donut chart (bottom right) ── -->
  <text x="350" y="210" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10" font-family="sans-serif">Diagnosis Split</text>

  <!-- Donut segments -->
  <!-- Full circle base -->
  <circle cx="350" cy="292" r="50" fill="none" stroke="#1e1628" stroke-width="18"/>
  <!-- Segment 1: 42% -->
  <circle cx="350" cy="292" r="50" fill="none" stroke="#c2a4ff" stroke-width="18"
    stroke-dasharray="131.9 182.2"
    stroke-dashoffset="45.5"
    stroke-opacity="0.85"
    transform="rotate(-90 350 292)"/>
  <!-- Segment 2: 28% -->
  <circle cx="350" cy="292" r="50" fill="none" stroke="#c2a4ff" stroke-width="18"
    stroke-dasharray="88"
    stroke-dashoffset="-86.4"
    stroke-opacity="0.5"
    transform="rotate(-90 350 292)"/>
  <!-- Segment 3: 18% -->
  <circle cx="350" cy="292" r="50" fill="none" stroke="#c2a4ff" stroke-width="18"
    stroke-dasharray="56.5"
    stroke-dashoffset="-174.4"
    stroke-opacity="0.3"
    transform="rotate(-90 350 292)"/>

  <!-- Donut center -->
  <circle cx="350" cy="292" r="32" fill="#0d0b10"/>
  <text x="350" y="288" text-anchor="middle" fill="#c2a4ff" font-size="14" font-weight="700" font-family="sans-serif">500+</text>
  <text x="350" y="302" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9" font-family="sans-serif">records</text>

  <!-- Legend -->
  <rect x="420" y="268" width="8" height="8" rx="2" fill="#c2a4ff" opacity="0.85"/>
  <text x="433" y="276" fill="rgba(255,255,255,0.5)" font-size="9" font-family="sans-serif">Class A (42%)</text>
  <rect x="420" y="284" width="8" height="8" rx="2" fill="#c2a4ff" opacity="0.5"/>
  <text x="433" y="292" fill="rgba(255,255,255,0.5)" font-size="9" font-family="sans-serif">Class B (28%)</text>
  <rect x="420" y="300" width="8" height="8" rx="2" fill="#c2a4ff" opacity="0.3"/>
  <text x="433" y="308" fill="rgba(255,255,255,0.5)" font-size="9" font-family="sans-serif">Other (30%)</text>

  <!-- Heatmap strip (bottom left) -->
  <text x="56" y="278" fill="rgba(255,255,255,0.4)" font-size="10" font-family="sans-serif">Correlation Heatmap</text>
  <g>
    <rect x="56" y="285" width="18" height="18" rx="2" fill="#c2a4ff" opacity="0.9"/>
    <rect x="76" y="285" width="18" height="18" rx="2" fill="#c2a4ff" opacity="0.5"/>
    <rect x="96" y="285" width="18" height="18" rx="2" fill="#c2a4ff" opacity="0.2"/>
    <rect x="116" y="285" width="18" height="18" rx="2" fill="#c2a4ff" opacity="0.7"/>
    <rect x="136" y="285" width="18" height="18" rx="2" fill="#c2a4ff" opacity="0.35"/>
    <rect x="156" y="285" width="18" height="18" rx="2" fill="#c2a4ff" opacity="0.85"/>

    <rect x="56" y="305" width="18" height="18" rx="2" fill="#c2a4ff" opacity="0.4"/>
    <rect x="76" y="305" width="18" height="18" rx="2" fill="#c2a4ff" opacity="0.9"/>
    <rect x="96" y="305" width="18" height="18" rx="2" fill="#c2a4ff" opacity="0.6"/>
    <rect x="116" y="305" width="18" height="18" rx="2" fill="#c2a4ff" opacity="0.15"/>
    <rect x="136" y="305" width="18" height="18" rx="2" fill="#c2a4ff" opacity="0.75"/>
    <rect x="156" y="305" width="18" height="18" rx="2" fill="#c2a4ff" opacity="0.45"/>

    <rect x="56" y="325" width="18" height="18" rx="2" fill="#c2a4ff" opacity="0.2"/>
    <rect x="76" y="325" width="18" height="18" rx="2" fill="#c2a4ff" opacity="0.6"/>
    <rect x="96" y="325" width="18" height="18" rx="2" fill="#c2a4ff" opacity="0.9"/>
    <rect x="116" y="325" width="18" height="18" rx="2" fill="#c2a4ff" opacity="0.5"/>
    <rect x="136" y="325" width="18" height="18" rx="2" fill="#c2a4ff" opacity="0.3"/>
    <rect x="156" y="325" width="18" height="18" rx="2" fill="#c2a4ff" opacity="0.8"/>
  </g>
</svg>
