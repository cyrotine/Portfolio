<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <!-- Background -->
  <rect width="600" height="360" fill="#0d0b10"/>

  <!-- Radial glow -->
  <radialGradient id="brainGlow" cx="50%" cy="48%" r="38%">
    <stop offset="0%" stop-color="#c2a4ff" stop-opacity="0.1"/>
    <stop offset="100%" stop-color="#c2a4ff" stop-opacity="0"/>
  </radialGradient>
  <rect width="600" height="360" fill="url(#brainGlow)"/>

  <!-- Scan lines (MRI grid) -->
  <g stroke="#c2a4ff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="60" x2="600" y2="60"/>
    <line x1="0" y1="90" x2="600" y2="90"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="150" x2="600" y2="150"/>
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="210" x2="600" y2="210"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="270" x2="600" y2="270"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
  </g>

  <!-- Brain silhouette (simplified side profile) -->
  <path d="M 240 320
    C 200 320 170 295 165 265
    C 155 240 158 215 165 195
    C 155 175 152 150 160 128
    C 168 105 185 90 205 82
    C 220 75 240 72 260 74
    C 278 60 298 52 320 54
    C 345 56 368 68 382 86
    C 400 105 405 130 400 155
    C 415 170 420 192 416 215
    C 420 238 415 265 400 282
    C 385 300 362 312 340 318
    C 320 323 300 323 280 322
    Z"
    fill="none"
    stroke="#c2a4ff"
    stroke-width="2"
    stroke-opacity="0.7"/>

  <!-- Brain surface folds (gyri/sulci lines) -->
  <path d="M 230 100 C 248 95 268 98 282 110 C 296 122 300 138 295 152" fill="none" stroke="#c2a4ff" stroke-opacity="0.35" stroke-width="1.5"/>
  <path d="M 295 152 C 290 165 295 178 308 183 C 322 188 338 184 348 174" fill="none" stroke="#c2a4ff" stroke-opacity="0.35" stroke-width="1.5"/>
  <path d="M 320 100 C 340 108 358 122 362 142 C 366 162 356 178 348 174" fill="none" stroke="#c2a4ff" stroke-opacity="0.35" stroke-width="1.5"/>
  <path d="M 220 155 C 228 168 240 178 255 180 C 270 182 282 176 295 152" fill="none" stroke="#c2a4ff" stroke-opacity="0.35" stroke-width="1.5"/>
  <path d="M 220 205 C 232 215 250 220 268 218 C 286 216 298 205 305 195" fill="none" stroke="#c2a4ff" stroke-opacity="0.35" stroke-width="1.5"/>
  <path d="M 305 195 C 318 185 334 183 348 190 C 362 197 368 212 362 226" fill="none" stroke="#c2a4ff" stroke-opacity="0.35" stroke-width="1.5"/>
  <path d="M 225 258 C 242 268 264 272 284 268 C 304 264 318 252 326 240" fill="none" stroke="#c2a4ff" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- Neural network overlay nodes -->
  <g fill="#c2a4ff" opacity="0.6">
    <circle cx="260" cy="112" r="3"/>
    <circle cx="310" cy="100" r="3"/>
    <circle cx="350" cy="120" r="3"/>
    <circle cx="245" cy="170" r="3"/>
    <circle cx="295" cy="155" r="3"/>
    <circle cx="345" cy="162" r="3"/>
    <circle cx="270" cy="220" r="3"/>
    <circle cx="315" cy="210" r="3"/>
    <circle cx="358" cy="228" r="3"/>
  </g>

  <!-- Neural connections -->
  <g stroke="#c2a4ff" stroke-opacity="0.2" stroke-width="1">
    <line x1="260" y1="112" x2="310" y2="100"/>
    <line x1="310" y1="100" x2="350" y2="120"/>
    <line x1="260" y1="112" x2="245" y2="170"/>
    <line x1="310" y1="100" x2="295" y2="155"/>
    <line x1="350" y1="120" x2="345" y2="162"/>
    <line x1="245" y1="170" x2="295" y2="155"/>
    <line x1="295" y1="155" x2="345" y2="162"/>
    <line x1="245" y1="170" x2="270" y2="220"/>
    <line x1="295" y1="155" x2="315" y2="210"/>
    <line x1="345" y1="162" x2="358" y2="228"/>
    <line x1="270" y1="220" x2="315" y2="210"/>
    <line x1="315" y1="210" x2="358" y2="228"/>
  </g>

  <!-- Accuracy badge -->
  <rect x="430" y="130" width="110" height="54" rx="10" fill="#160f20" stroke="#c2a4ff" stroke-opacity="0.4" stroke-width="1"/>
  <text x="485" y="151" text-anchor="middle" fill="#c2a4ff" font-size="22" font-weight="700" font-family="sans-serif">96%</text>
  <text x="485" y="168" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10" font-family="sans-serif">Accuracy</text>

  <!-- AUC badge -->
  <rect x="430" y="198" width="110" height="54" rx="10" fill="#160f20" stroke="#c2a4ff" stroke-opacity="0.4" stroke-width="1"/>
  <text x="485" y="219" text-anchor="middle" fill="#c2a4ff" font-size="22" font-weight="700" font-family="sans-serif">0.99</text>
  <text x="485" y="236" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10" font-family="sans-serif">AUC-ROC</text>

  <!-- Scan progress bar (bottom) -->
  <rect x="100" y="340" width="400" height="3" rx="2" fill="#1e1628"/>
  <rect x="100" y="340" width="340" height="3" rx="2" fill="#c2a4ff" opacity="0.6"/>
  <text x="300" y="356" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="10" font-family="sans-serif">6,400+ MRI scans · EfficientNetB0 · Transfer Learning</text>
</svg>
